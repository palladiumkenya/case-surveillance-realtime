spring.application.name=worker
server.port=8088
server.forward-headers-strategy=framework

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}

spring.datasource.hikari.minimumIdle=20
spring.datasource.hikari.maximumPoolSize=30
spring.datasource.hikari.connectionTimeout=50000

logging.file.name=/tmp/logs/worker.log

spring.boot.admin.client.url=${SPRING_BOOT_ADMIN_CLIENT_URL}
spring.boot.admin.client.username=${ADMIN_USERNAME}
spring.boot.admin.client.password=${ADMIN_PASSWORD}


spring.security.user.name=${ACTUATOR_USERNAME}
spring.security.user.password=${ACTUATOR_PASSWORD}
spring.boot.admin.client.instance.metadata.user.name=${ACTUATOR_USERNAME}
spring.boot.admin.client.instance.metadata.user.password=${ACTUATOR_PASSWORD}
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

